# =====================================================================
# application-local.yml - 로컬 개발 프로파일
# 실행: --spring.profiles.active=local (기본값)
# 사전 준비: 로컬 MariaDB 에 precost 스키마/계정 생성
#   CREATE DATABASE precost CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
#   CREATE USER 'precost'@'%' IDENTIFIED BY 'precost';
#   GRANT ALL PRIVILEGES ON precost.* TO 'precost'@'%';
# =====================================================================
spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/precost?characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
    username: precost
    password: precost

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    # 로컬에서는 샘플 데이터(V2, V0_1)까지 포함하여 적용
    clean-disabled: false

logging:
  level:
    com.company.precost: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# 샘플 계정(로컬 전용) — 공통 비밀번호: Precost!2026
#   admin / cost1 / prod1 / purchase1 / manager1
